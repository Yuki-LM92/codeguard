<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛡️ CodeGuard</title>
<style>
  :root {
    --color-safe:     #22c55e;
    --color-low:      #3b82f6;
    --color-medium:   #eab308;
    --color-high:     #f97316;
    --color-critical: #ef4444;

    --bg: #f8f9fa;
    --bg-card: #ffffff;
    --bg-history: #f1f5f9;
    --text: #1e293b;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --input-bg: #ffffff;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --bg-card: #1e293b;
      --bg-history: #1e293b;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --border: #334155;
      --input-bg: #1e293b;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', 'Yu Gothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ヘッダー */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  #header h1 { font-size: 15px; font-weight: 700; }
  #header-tabs { display: flex; gap: 8px; }
  .tab-btn {
    padding: 4px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 12px;
  }
  .tab-btn.active {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }
  #status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #94a3b8;
    display: inline-block;
    margin-right: 6px;
  }
  #status-dot.connected { background: var(--color-safe); }

  /* メインコンテンツ */
  #main { padding: 12px 14px; max-width: 640px; margin: 0 auto; }

  /* 解説カード */
  .card {
    border-radius: 10px;
    border: 2px solid var(--border);
    background: var(--bg-card);
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .card[data-risk="safe"]     { border-color: var(--color-safe); }
  .card[data-risk="low"]      { border-color: var(--color-low); }
  .card[data-risk="medium"]   { border-color: var(--color-medium); }
  .card[data-risk="high"]     { border-color: var(--color-high); }
  .card[data-risk="critical"] { border-color: var(--color-critical); }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    font-weight: 700;
    font-size: 12px;
  }
  .card[data-risk="safe"]     .card-header { background: #dcfce7; color: #15803d; }
  .card[data-risk="low"]      .card-header { background: #dbeafe; color: #1d4ed8; }
  .card[data-risk="medium"]   .card-header { background: #fef9c3; color: #a16207; }
  .card[data-risk="high"]     .card-header { background: #ffedd5; color: #c2410c; }
  .card[data-risk="critical"] .card-header { background: #fee2e2; color: #b91c1c; }

  @media (prefers-color-scheme: dark) {
    .card[data-risk="safe"]     .card-header { background: #14532d; color: #86efac; }
    .card[data-risk="low"]      .card-header { background: #1e3a5f; color: #93c5fd; }
    .card[data-risk="medium"]   .card-header { background: #422006; color: #fde047; }
    .card[data-risk="high"]     .card-header { background: #431407; color: #fdba74; }
    .card[data-risk="critical"] .card-header { background: #450a0a; color: #fca5a5; }
  }

  .risk-badge {
    display: flex; align-items: center; gap: 6px;
  }
  .risk-dot {
    width: 10px; height: 10px; border-radius: 50%;
  }
  .card[data-risk="safe"]     .risk-dot { background: var(--color-safe); }
  .card[data-risk="low"]      .risk-dot { background: var(--color-low); }
  .card[data-risk="medium"]   .risk-dot { background: var(--color-medium); }
  .card[data-risk="high"]     .risk-dot { background: var(--color-high); }
  .card[data-risk="critical"] .risk-dot { background: var(--color-critical); }

  .card-body { padding: 12px; }

  .section { margin-bottom: 10px; }
  .section-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }

  .command-box {
    background: #1e293b;
    color: #e2e8f0;
    padding: 8px 10px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
    font-size: 12px;
    word-break: break-all;
  }

  @media (prefers-color-scheme: dark) {
    .command-box { background: #0f172a; }
  }

  .option-list { list-style: none; }
  .option-list li {
    display: flex; gap: 8px;
    padding: 3px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .option-list li:last-child { border-bottom: none; }
  .option-key {
    font-family: monospace;
    font-weight: 700;
    min-width: 50px;
    color: var(--color-low);
  }

  .recommendation-box {
    padding: 8px 10px;
    border-radius: 6px;
    font-weight: 600;
    font-size: 12px;
  }
  .recommendation-box.allow   { background: #dcfce7; color: #15803d; }
  .recommendation-box.confirm { background: #fef9c3; color: #a16207; }
  .recommendation-box.deny    { background: #fee2e2; color: #b91c1c; }

  @media (prefers-color-scheme: dark) {
    .recommendation-box.allow   { background: #14532d; color: #86efac; }
    .recommendation-box.confirm { background: #422006; color: #fde047; }
    .recommendation-box.deny    { background: #450a0a; color: #fca5a5; }
  }

  /* 参考セクション（折りたたみ） */
  details { margin-top: 8px; }
  summary {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    list-style: none;
    display: flex; align-items: center; gap: 4px;
  }
  summary::-webkit-details-marker { display: none; }
  summary::before { content: '▶'; font-size: 9px; transition: transform 0.2s; }
  details[open] summary::before { transform: rotate(90deg); }
  .example-box {
    margin-top: 6px;
    background: var(--bg-history);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 11px;
    line-height: 1.7;
  }
  .example-safe  { color: #15803d; }
  .example-danger { color: #b91c1c; }
  @media (prefers-color-scheme: dark) {
    .example-safe  { color: #86efac; }
    .example-danger { color: #fca5a5; }
  }

  /* 手動入力エリア */
  #manual-section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 12px;
  }
  #manual-section h3 { font-size: 12px; font-weight: 700; margin-bottom: 8px; color: var(--text-muted); }
  #manual-input-row { display: flex; gap: 8px; }
  #manual-input {
    flex: 1;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--input-bg);
    color: var(--text);
    font-family: monospace;
    font-size: 12px;
  }
  #manual-input:focus { outline: none; border-color: var(--color-low); }
  #manual-btn {
    padding: 7px 14px;
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
  }
  #manual-btn:hover { opacity: 0.85; }

  /* 履歴 */
  #history-section h3 { font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  #history-list { list-style: none; }
  .history-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    border-bottom: 1px solid var(--border);
  }
  .history-item:last-child { border-bottom: none; }
  .history-item:hover { background: var(--bg-history); }
  .history-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .history-cmd { font-family: monospace; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .history-time { font-size: 10px; color: var(--text-muted); flex-shrink: 0; }

  /* 空状態 */
  #empty-state {
    text-align: center;
    padding: 32px 16px;
    color: var(--text-muted);
  }
  #empty-state .icon { font-size: 32px; margin-bottom: 8px; }
  #empty-state p { font-size: 12px; }

  /* アニメーション */
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card { animation: slideIn 0.2s ease; }

  /* タブ切り替え */
  .tab-content { display: none; }
  .tab-content.active { display: block; }
</style>
</head>
<body>

<div id="header">
  <h1><span id="status-dot"></span>🛡️ CodeGuard</h1>
  <div id="header-tabs">
    <button class="tab-btn active" onclick="switchTab('monitor')">監視</button>
    <button class="tab-btn" onclick="switchTab('history')">履歴</button>
    <button class="tab-btn" onclick="switchTab('settings')">設定</button>
  </div>
</div>

<div id="main">

  <!-- 監視タブ -->
  <div id="tab-monitor" class="tab-content active">
    <!-- 手動入力 -->
    <div id="manual-section">
      <h3>🔍 コマンドを入力して解説を表示</h3>
      <div id="manual-input-row">
        <input id="manual-input" type="text" placeholder="例: rm -rf ./dist" autocomplete="off" spellcheck="false">
        <button id="manual-btn" onclick="analyzeManual()">解説を表示</button>
      </div>
    </div>

    <!-- 最新の承認リクエスト -->
    <div id="latest-section">
      <div id="empty-state">
        <div class="icon">🛡️</div>
        <p>Claude Codeの承認リクエストを待っています…</p>
        <p style="margin-top:4px">コマンド実行時に自動で解説が表示されます</p>
      </div>
    </div>
  </div>

  <!-- 履歴タブ -->
  <div id="tab-history" class="tab-content">
    <div id="history-section">
      <h3>承認リクエスト履歴</h3>
      <ul id="history-list">
        <li style="padding:16px; text-align:center; color:var(--text-muted); font-size:12px;">まだ履歴がありません</li>
      </ul>
    </div>
  </div>

  <!-- 設定タブ -->
  <div id="tab-settings" class="tab-content">
    <div id="settings-section" style="background:var(--bg-card); border-radius:10px; padding:16px; border:1px solid var(--border);">
      <h3 style="font-size:13px; font-weight:700; margin-bottom:12px;">設定</h3>
      <div style="display:flex; flex-direction:column; gap:12px; font-size:12px;">
        <label style="display:flex; align-items:center; justify-content:space-between;">
          <span>通知音（criticalのみ）</span>
          <input type="checkbox" id="sound-enabled" checked>
        </label>
        <label style="display:flex; align-items:center; justify-content:space-between;">
          <span>ブラウザ通知</span>
          <input type="checkbox" id="notify-enabled" checked>
        </label>
        <div style="display:flex; align-items:center; justify-content:space-between;">
          <span>接続状態</span>
          <span id="settings-status" style="color:var(--text-muted);">確認中...</span>
        </div>
        <div style="border-top:1px solid var(--border); padding-top:10px; color:var(--text-muted);">
          <div>WebSocket: <code id="ws-url-display" style="font-size:11px;"></code></div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
const RISK_LABELS = {
  safe:     '🟢 安全',
  low:      '🔵 ほぼ安全',
  medium:   '🟡 注意',
  high:     '🟠 警告',
  critical: '🔴 危険'
};

const RISK_COLORS = {
  safe:     '#22c55e',
  low:      '#3b82f6',
  medium:   '#eab308',
  high:     '#f97316',
  critical: '#ef4444'
};

let ws = null;
let history = [];
let connected = false;

// WebSocket接続
function connect() {
  const wsPort = (window.CODEGUARD_CONFIG && window.CODEGUARD_CONFIG.wsPort) || 19281;
  const wsUrl = `ws://localhost:${wsPort}`;
  document.getElementById('ws-url-display').textContent = wsUrl;

  try {
    ws = new WebSocket(wsUrl);
  } catch(e) {
    scheduleReconnect();
    return;
  }

  ws.onopen = () => {
    connected = true;
    document.getElementById('status-dot').className = 'connected';
    document.getElementById('settings-status').textContent = '接続中';
    document.getElementById('settings-status').style.color = '#22c55e';
  };

  ws.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      if (data.type === 'approval') {
        handleApprovalRequest(data.payload);
      } else if (data.type === 'warning') {
        showSystemWarning(data.message);
      }
    } catch(e) {}
  };

  ws.onclose = () => {
    connected = false;
    document.getElementById('status-dot').className = '';
    document.getElementById('settings-status').textContent = '切断中';
    document.getElementById('settings-status').style.color = '#ef4444';
    scheduleReconnect();
  };

  ws.onerror = () => {
    ws.close();
  };
}

function scheduleReconnect() {
  setTimeout(connect, 3000);
}

// 承認リクエストの処理
function handleApprovalRequest(data) {
  addToHistory(data);
  showCard(data, true);
  notifyUser(data);
  if (data.riskLevel === 'critical' && document.getElementById('sound-enabled').checked) {
    playBeep();
  }
}

function showCard(data, isNew = false) {
  const section = document.getElementById('latest-section');
  const empty = document.getElementById('empty-state');
  if (empty) empty.remove();

  const card = buildCard(data, isNew);
  // 新着は先頭に挿入
  if (isNew) {
    section.insertBefore(card, section.firstChild);
    // 古いカードは5件まで
    const cards = section.querySelectorAll('.card');
    if (cards.length > 5) cards[cards.length - 1].remove();
  } else {
    section.appendChild(card);
  }
}

function buildCard(data, isNew) {
  const card = document.createElement('div');
  card.className = 'card';
  card.setAttribute('data-risk', data.riskLevel || 'medium');

  const time = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  const riskLabel = RISK_LABELS[data.riskLevel] || '🟡 不明';
  const cmdInfo = data.commandInfo || {};
  const ctx = data.contextAnalysis || {};
  const options = cmdInfo.options || {};
  const hasOptions = Object.keys(options).length > 0;
  const hasTarget = ctx.target || ctx.targetDescription;
  const hasSafe = data.safeExample;
  const hasDanger = data.dangerExample;
  const hasExamples = hasSafe || hasDanger;

  let optionsHtml = '';
  if (hasOptions) {
    const items = Object.entries(options).map(([k, v]) =>
      `<li><span class="option-key">${esc(k)}</span><span>${esc(v)}</span></li>`
    ).join('');
    optionsHtml = `
      <div class="section">
        <div class="section-label">⚙️ オプションの意味</div>
        <ul class="option-list">${items}</ul>
      </div>`;
  }

  let targetHtml = '';
  if (hasTarget) {
    targetHtml = `
      <div class="section">
        <div class="section-label">🎯 対象</div>
        <div>${esc(ctx.targetDescription || ctx.target)}</div>
      </div>`;
  }

  let examplesHtml = '';
  if (hasExamples) {
    examplesHtml = `
      <details>
        <summary>参考（安全・危険な例）</summary>
        <div class="example-box">
          ${hasSafe   ? `<div class="example-safe">✅ 安全な例: ${esc(data.safeExample)}</div>` : ''}
          ${hasDanger ? `<div class="example-danger" style="margin-top:4px">⚠️ 危険な例: ${esc(data.dangerExample)}</div>` : ''}
        </div>
      </details>`;
  }

  const subCmdHtml = cmdInfo.subcommandJa
    ? ` <span style="opacity:.7; font-weight:400; font-size:11px;">（${esc(cmdInfo.subcommandJa)}）</span>` : '';

  const recommendationClass = ctx.recommendation || 'confirm';

  card.innerHTML = `
    <div class="card-header">
      <div class="risk-badge">
        <span class="risk-dot"></span>
        ${esc(riskLabel)}${isNew ? ' <span style="font-size:10px; opacity:.7">NEW</span>' : ''}
      </div>
      <span style="font-size:10px; opacity:.6">${time}</span>
    </div>
    <div class="card-body">
      <div class="section">
        <div class="section-label">実行コマンド</div>
        <div class="command-box">${esc(data.raw || '(不明)')}</div>
      </div>
      ${data.wrapperCommand ? `
      <div class="section">
        <div style="padding:6px 10px; border-radius:6px; background:#fef9c3; color:#a16207; font-size:12px; font-weight:600;">
          🔐 ${esc(data.wrapperCommand.nameJa)} 経由<br>
          <span style="font-weight:400">${esc(data.wrapperCommand.warning)}</span>
        </div>
      </div>` : ''}
      <div class="section">
        <div class="section-label">📝 何をするコマンド？</div>
        <div style="font-weight:600">${esc(cmdInfo.nameJa || '不明')}${subCmdHtml}</div>
        <div style="margin-top:4px; color:var(--text-muted)">${esc(cmdInfo.description || '')}</div>
      </div>
      ${optionsHtml}
      ${targetHtml}
      ${ctx.riskReason ? `
      <div class="section">
        <div class="section-label">💡 判断のポイント</div>
        <div>${esc(ctx.riskReason)}</div>
      </div>` : ''}
      ${ctx.recommendationText ? `
      <div class="section">
        <div class="recommendation-box ${recommendationClass}">${esc(ctx.recommendationText)}</div>
      </div>` : ''}
      ${examplesHtml}
    </div>
  `;
  return card;
}

function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// 履歴
function addToHistory(data) {
  const time = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  history.unshift({ data, time });
  if (history.length > 100) history.pop();
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('history-list');
  if (history.length === 0) {
    list.innerHTML = '<li style="padding:16px; text-align:center; color:var(--text-muted); font-size:12px;">まだ履歴がありません</li>';
    return;
  }
  list.innerHTML = history.map((item, idx) => {
    const color = RISK_COLORS[item.data.riskLevel] || '#94a3b8';
    return `
      <li class="history-item" onclick="showHistoryCard(${idx})">
        <span class="history-dot" style="background:${color}"></span>
        <span class="history-cmd">${esc(item.data.raw)}</span>
        <span class="history-time">${item.time}</span>
      </li>`;
  }).join('');
}

function showHistoryCard(idx) {
  switchTab('monitor');
  showCard(history[idx].data, false);
  window.scrollTo(0, 0);
}

// 手動入力
async function analyzeManual() {
  const input = document.getElementById('manual-input');
  const cmd = input.value.trim();
  if (!cmd) return;

  try {
    const res = await fetch(`/api/analyze?command=${encodeURIComponent(cmd)}`);
    const data = await res.json();
    handleApprovalRequest(data);
    input.value = '';
  } catch(e) {
    alert('解析できませんでした。サーバーが起動しているか確認してください。');
  }
}

// Enterキーで送信
document.getElementById('manual-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') analyzeManual();
});

// ブラウザ通知
function notifyUser(data) {
  if (!document.getElementById('notify-enabled').checked) return;
  if (!('Notification' in window)) return;
  if (Notification.permission === 'granted') {
    const riskLabel = RISK_LABELS[data.riskLevel] || '不明';
    new Notification(`${riskLabel} - CodeGuard`, {
      body: data.raw || '承認リクエストがあります',
      icon: '/favicon.ico'
    });
  } else if (Notification.permission !== 'denied') {
    Notification.requestPermission();
  }

  // タブタイトル点滅（critical/high）
  if (['critical', 'high'].includes(data.riskLevel)) {
    let blink = true;
    const timer = setInterval(() => {
      document.title = blink ? '⚠️ 承認確認 - CodeGuard' : '🛡️ CodeGuard';
      blink = !blink;
    }, 800);
    setTimeout(() => {
      clearInterval(timer);
      document.title = '🛡️ CodeGuard';
    }, 8000);
  }
}

// ビープ音
function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.3);
  } catch(e) {}
}

// システム警告の表示
function showSystemWarning(message) {
  const banner = document.createElement('div');
  banner.style.cssText = 'background:#fef9c3;color:#a16207;padding:8px 14px;font-size:12px;font-weight:600;text-align:center;border-bottom:1px solid #fde047;';
  banner.textContent = '⚠️ ' + message;
  document.getElementById('header').after(banner);
}

// タブ切り替え
function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
  const btns = document.querySelectorAll('.tab-btn');
  const names = ['monitor', 'history', 'settings'];
  btns[names.indexOf(name)].classList.add('active');
}
